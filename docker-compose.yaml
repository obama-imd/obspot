services:
  postgres:
    container_name: 'osbpot-postgres'
    image: 'postgres:latest'
    environment:
      - 'POSTGRES_DB=obspot_dev'
      - 'POSTGRES_PASSWORD=admin'
      - 'POSTGRES_USER=admin'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: